<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2E7D32" />
    <title>Offline — Aavinam</title>
    <style>
        /* Minimal inline CSS — no external dependencies */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green: #2E7D32;
            --green-light: #4CAF50;
            --green-pale: #E8F5E9;
            --text: #1b1b1b;
            --muted: #6c757d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--green-pale);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(46, 125, 50, 0.12);
            max-width: 400px;
            width: 100%;
        }

        .icon {
            font-size: 72px;
            margin-bottom: 16px;
            display: block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--green);
            margin-bottom: 12px;
        }

        p {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .tips {
            background: var(--green-pale);
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            text-align: left;
        }

        .tips p {
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #374151;
        }

        .tips p:last-child {
            margin-bottom: 0;
        }

        .tips span {
            margin-right: 6px;
        }

        .btn-retry {
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            min-height: 48px;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        .btn-retry:active {
            background: var(--green-light);
            transform: scale(0.98);
        }

        .app-name {
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="card">
        <span class="icon">📵</span>
        <h1>You're Offline</h1>
        <p>No internet connection detected.</p>
        <p>Don't worry — your data is safe locally.</p>

        <div class="tips">
            <p><span>📶</span>Check your Wi-Fi or mobile data</p>
            <p><span>🔄</span>Try turning Airplane mode off/on</p>
            <p><span>💡</span>Most features work offline already</p>
        </div>

        <button class="btn-retry" onclick="window.location.reload()">
            🔄 Try Again
        </button>

        <p class="app-name">Aavinam — Milk Management</p>
    </div>
</body>

</html>
