<!doctype html>
<html lang="en">

<head>

  <!-- Viewport: optimized for mobile-first, prevents zoom on input focus -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- App Identity -->
  <title>Aavinam</title>
  <meta name="description"
    content="Aavinam — Offline-first Milk Society & Local Milk Shop Management for rural dairy operations." />
  <meta name="application-name" content="Aavinam" />

  <link rel="manifest" href="/manifest.json" />
